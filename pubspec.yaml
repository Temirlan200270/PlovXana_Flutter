name: plovxana
description: "ПЛОВ НОМЕР 1 — официальное приложение ресторана"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.9.0

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17

  # Utils
  url_launcher: ^6.3.1
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  equatable: ^2.0.7
  marionette_flutter: ^0.3.0

  cupertino_icons: ^1.0.8
  sentry_flutter: ^9.10.0
  connectivity_plus: ^6.0.0
  shimmer: ^3.0.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  marionette_mcp: ^0.3.0
  patrol: any

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

patrol:
  app_name: ПЛОВ НОМЕР 1
  android:
    package_name: kz.plovxana.plovxana
  ios:
    bundle_id: kz.plovxana.plovxana
