name: DB migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Supabase CI config
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "::error::Secret SUPABASE_ACCESS_TOKEN не задан. Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ]; then
            echo "::error::Secret SUPABASE_DB_PASSWORD не задан."
            exit 1
          fi
          REF="${{ vars.SUPABASE_PROJECT_REF }}"
          if [ -z "$REF" ]; then
            REF="dvmkxopjbwozgbckumdm"
            echo "Variable SUPABASE_PROJECT_REF не задана, используем ref проекта: $REF"
          fi
          echo "SUPABASE_PROJECT_REF=$REF" >> "$GITHUB_ENV"

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }} --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
