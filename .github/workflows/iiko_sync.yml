name: iiko → Supabase sync

on:
  schedule:
    - cron: '0 * * * *'   # каждый час
  workflow_dispatch:        # ручной запуск из GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/iiko_sync

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/iiko_sync/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync menu
        run: python sync.py menu
        env:
          IIKO_API_LOGIN: ${{ secrets.IIKO_API_LOGIN }}
          IIKO_ORGANIZATION_ID: ${{ secrets.IIKO_ORGANIZATION_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Sync stop lists
        run: python sync.py stop
        env:
          IIKO_API_LOGIN: ${{ secrets.IIKO_API_LOGIN }}
          IIKO_ORGANIZATION_ID: ${{ secrets.IIKO_ORGANIZATION_ID }}
          IIKO_TERMINAL_GROUP_ID: ${{ secrets.IIKO_TERMINAL_GROUP_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
